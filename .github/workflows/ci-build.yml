# Proves the site builds on Linux (same family as Vercel). Runs on every push.
name: CI — Linux build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Drop source-only media (Next.js uses public/ only)
        run: |
          rm -rf Pictures
          rm -f "Detail Clinic Website 2.0.mov" || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # API route reads this at build; use a dummy so Next can compile
          AN_API_KEY: dummy-key-for-ci-build-only
